<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פיצה בנימינה — ניהול הזמנות</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy,
    onSnapshot, doc, updateDoc, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVCHS0mTAq9MiW89ZHOITayFJBsj1uCKM",
    authDomain: "hadadpizza.firebaseapp.com",
    projectId: "hadadpizza",
    storageBucket: "hadadpizza.firebasestorage.app",
    messagingSenderId: "797833187551",
    appId: "1:797833187551:web:a8c36d4c56b623a241596a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window._db         = db;
  window._collection = collection;
  window._query      = query;
  window._orderBy    = orderBy;
  window._onSnapshot = onSnapshot;
  window._doc        = doc;
  window._updateDoc  = updateDoc;
  window._deleteDoc  = deleteDoc;
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
:root{
  --ink:#0F0A04;--coal:#1A1007;--char:#231408;
  --cream:#FAF3E0;--smoke:#F3E9CA;
  --tc:#C1440E;--tc-d:#8B2E06;--tc-l:#E05A20;
  --gold:#C8901A;--gold-l:#E8B040;--muted:#7A6040;--border:#DDD0B0;
  --green:#22C55E;--green-d:#16A34A;
  --blue:#3B82F6;--blue-d:#1D4ED8;
  --purple:#8B5CF6;--purple-d:#6D28D9;
  --orange:#F97316;--orange-d:#C2410C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F0EAD6;color:var(--ink);font-family:'Heebo',sans-serif;min-height:100vh;}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--coal) 0%,#2C1810 100%);
  padding:24px;
}
.login-box{
  background:var(--cream);width:min(380px,100%);
  border-radius:28px;padding:44px 32px;text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
}
.login-logo{font-size:56px;margin-bottom:8px;}
.login-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.login-field{margin-bottom:16px;text-align:right;}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase;}
.login-field input{
  width:100%;border:2px solid var(--border);border-radius:14px;
  padding:14px 18px;font-size:16px;font-family:'Heebo',sans-serif;
  background:#fff;outline:none;transition:border-color .2s;
}
.login-field input:focus{border-color:var(--tc);}
.login-field input.err{border-color:var(--tc);background:rgba(193,68,14,.03);}
.login-btn{
  width:100%;background:linear-gradient(135deg,var(--tc),var(--tc-l));
  color:#fff;border:none;padding:16px;border-radius:14px;
  font-size:16px;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif;
  box-shadow:0 4px 20px rgba(193,68,14,.4);transition:all .2s;margin-top:8px;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(193,68,14,.5);}
.login-err{font-size:13px;color:var(--tc);margin-top:12px;display:none;}

/* ── APP ── */
#app{display:none;}

/* ── TOP BAR ── */
.topbar{
  background:var(--coal);padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.topbar-brand{display:flex;align-items:center;gap:12px;}
.topbar-logo{font-size:28px;}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--cream);}
.topbar-sub{font-size:11px;color:rgba(250,243,224,.35);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.8);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.live-txt{font-size:12px;color:rgba(250,243,224,.5);}
.logout-btn{background:rgba(250,243,224,.08);border:1px solid rgba(250,243,224,.12);color:rgba(250,243,224,.5);padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .2s;}
.logout-btn:hover{background:rgba(250,243,224,.15);color:var(--cream);}

/* ── STATS ── */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px;padding:20px 20px 0;max-width:1200px;margin:0 auto;
}
.stat-card{
  background:#fff;border-radius:18px;padding:20px 18px;
  border:1px solid rgba(221,208,176,.5);
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.stat-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500;}
.stat-card.red .stat-num{color:var(--tc-d);}
.stat-card.green .stat-num{color:var(--green-d);}
.stat-card.gold .stat-num{color:var(--gold);}
.stat-card.blue .stat-num{color:var(--blue);}
.stat-card.orange .stat-num{color:var(--orange-d);}

/* ── FILTERS ── */
.filters{
  padding:16px 20px;max-width:1200px;margin:0 auto;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.filter-date{
  border:1.5px solid var(--border);border-radius:12px;
  padding:9px 14px;font-size:14px;font-family:'Heebo',sans-serif;
  background:#fff;outline:none;color:var(--char);cursor:pointer;
  transition:border-color .15s;
}
.filter-date:focus{border-color:var(--tc);}
.filter-btn{
  padding:9px 18px;border-radius:12px;border:1.5px solid var(--border);
  background:#fff;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'Heebo',sans-serif;color:var(--muted);transition:all .15s;
}
.filter-btn:hover,.filter-btn.active{border-color:var(--tc);background:rgba(193,68,14,.06);color:var(--tc-d);}
.filter-sep{width:1px;height:28px;background:var(--border);}

/* ── ORDERS LIST ── */
.orders-wrap{max-width:1200px;margin:0 auto;padding:0 20px 40px;}
.orders-date-group{margin-bottom:28px;}
.date-header{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  font-size:13px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;
}
.date-header::after{content:'';flex:1;height:1px;background:var(--border);}

.order-card{
  background:#fff;border-radius:20px;
  border:2px solid transparent;
  box-shadow:0 2px 14px rgba(0,0,0,.06);
  margin-bottom:12px;overflow:hidden;
  transition:box-shadow .2s,border-color .2s;
  position:relative;
}
.order-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);}
.order-card.status-new{border-color:rgba(193,68,14,.35);}
.order-card.status-confirmed{border-color:rgba(59,130,246,.3);}
.order-card.status-ready{border-color:rgba(249,115,22,.45);}
.order-card.status-transferred{border-color:rgba(34,197,94,.3);opacity:.75;}
.order-card.status-cancelled{border-color:var(--border);opacity:.5;}

/* status strip */
.status-strip{
  position:absolute;right:0;top:0;bottom:0;width:5px;
}
.status-new .status-strip{background:var(--tc);}
.status-confirmed .status-strip{background:var(--blue);}
.status-ready .status-strip{background:var(--orange);}
.status-transferred .status-strip{background:var(--green);}
.status-cancelled .status-strip{background:#ccc;}

.order-main{padding:18px 20px 18px 24px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;}
.order-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.order-num{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--char);}
.order-time{font-size:12px;color:var(--muted);background:var(--smoke);padding:3px 10px;border-radius:20px;}
.status-badge{
  font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;
  letter-spacing:.3px;
}
.status-badge.new{background:rgba(193,68,14,.1);color:var(--tc-d);}
.status-badge.confirmed{background:rgba(59,130,246,.1);color:var(--blue-d);}
.status-badge.ready{background:rgba(249,115,22,.12);color:var(--orange-d);}
.status-badge.transferred{background:rgba(34,197,94,.1);color:var(--green-d);}
.status-badge.cancelled{background:#f5f5f5;color:#999;}

.order-customer{font-size:15px;font-weight:700;color:var(--char);margin-bottom:4px;}
.order-info-row{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:10px;}
.order-info-row span{display:flex;align-items:center;gap:4px;}

.order-items{background:var(--smoke);border-radius:12px;padding:12px 14px;margin-bottom:0;font-size:13.5px;}
.order-item-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed rgba(221,208,176,.6);}
.order-item-row:last-child{border-bottom:none;}
.order-item-name{color:var(--char);font-weight:500;}
.order-item-price{color:var(--tc-d);font-weight:700;}
.order-deals{font-size:12px;color:var(--green-d);font-weight:600;margin-top:6px;}

.order-total-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.order-total-lbl{font-size:13px;color:var(--muted);}
.order-total-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--tc-d);}

/* actions */
.order-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.action-btn{
  border:none;padding:9px 14px;border-radius:12px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.btn-confirm{background:rgba(59,130,246,.1);color:var(--blue-d);}
.btn-confirm:hover{background:var(--blue);color:#fff;}
.btn-ready{background:rgba(249,115,22,.12);color:var(--orange-d);}
.btn-ready:hover{background:var(--orange);color:#fff;}
.btn-cancel{background:#f5f5f5;color:#999;}
.btn-cancel:hover{background:#fee2e2;color:#dc2626;}
.btn-wa{background:rgba(37,211,102,.1);color:#128C7E;}
.btn-wa:hover{background:#25D366;color:#fff;}

/* empty */
.empty-orders{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:64px;margin-bottom:16px;}

/* loading */
.loading-wrap{text-align:center;padding:80px;color:var(--muted);}

/* toast */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--char);color:var(--cream);padding:12px 24px;border-radius:30px;
  font-size:14px;font-weight:600;z-index:9999;transition:transform .3s;
  white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.3);
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* delay modal */
#delay-modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px;
}
#delay-modal.open{display:flex;}
.delay-box{
  background:var(--cream);border-radius:24px;padding:36px 32px;
  width:min(360px,100%);text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
}
.delay-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:6px;}
.delay-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.delay-mins-row{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
.delay-min-btn{
  padding:11px 20px;border-radius:14px;border:2px solid var(--border);
  background:#fff;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Heebo',sans-serif;color:var(--char);transition:all .15s;
}
.delay-min-btn:hover,.delay-min-btn.sel{border-color:var(--orange);background:rgba(249,115,22,.1);color:var(--orange-d);}
.delay-custom{display:flex;gap:8px;margin-bottom:20px;}
.delay-custom input{
  flex:1;border:2px solid var(--border);border-radius:12px;
  padding:11px 14px;font-size:15px;font-family:'Heebo',sans-serif;
  background:#fff;outline:none;text-align:center;
}
.delay-custom input:focus{border-color:var(--orange);}
.delay-send-btn{
  width:100%;background:linear-gradient(135deg,var(--orange-d),var(--orange));
  color:#fff;border:none;padding:15px;border-radius:14px;
  font-size:16px;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif;
  box-shadow:0 4px 18px rgba(249,115,22,.35);transition:all .2s;
}
.delay-send-btn:hover{transform:translateY(-2px);}
.delay-cancel-btn{
  width:100%;background:transparent;border:none;color:var(--muted);
  font-size:13px;cursor:pointer;font-family:'Heebo',sans-serif;margin-top:12px;
  padding:8px;
}

@media(max-width:600px){
  .order-main{grid-template-columns:1fr;}
  .order-actions{flex-direction:row;flex-wrap:wrap;}
  .action-btn{flex:1;min-width:80px;text-align:center;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍕</div>
    <div class="login-title">פיצה בנימינה</div>
    <div class="login-sub">כניסה למנהל בלבד</div>
    <div class="login-field">
      <label>סיסמה</label>
      <input type="password" id="pwd-input" placeholder="הכנס סיסמה..." onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">כניסה →</button>
    <div class="login-err" id="login-err">❌ סיסמה שגויה</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">🍕</div>
      <div>
        <div class="topbar-title">ניהול הזמנות</div>
        <div class="topbar-sub">פיצה בנימינה · דביר חדד</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="live-dot"></div>
      <span class="live-txt">עדכון חי</span>
      <button class="logout-btn" onclick="doLogout()">יציאה</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card red">
      <div class="stat-num" id="stat-new">—</div>
      <div class="stat-lbl">🆕 הזמנות חדשות</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-num" id="stat-confirmed">—</div>
      <div class="stat-lbl">✅ אושרו</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-num" id="stat-ready">—</div>
      <div class="stat-lbl">🍕 מוכנות</div>
    </div>
    <div class="stat-card green">
      <div class="stat-num" id="stat-transferred">—</div>
      <div class="stat-lbl">🚀 הועברו היום</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-num" id="stat-revenue">—</div>
      <div class="stat-lbl">💰 הכנסות היום</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <input type="date" class="filter-date" id="filter-date" onchange="applyFilters()">
    <div class="filter-sep"></div>
    <button class="filter-btn active" data-status="all" onclick="setStatusFilter(this,'all')">הכל</button>
    <button class="filter-btn" data-status="new" onclick="setStatusFilter(this,'new')">חדשות 🆕</button>
    <button class="filter-btn" data-status="confirmed" onclick="setStatusFilter(this,'confirmed')">אושרו ✅</button>
    <button class="filter-btn" data-status="ready" onclick="setStatusFilter(this,'ready')">מוכנות 🍕</button>
    <button class="filter-btn" data-status="transferred" onclick="setStatusFilter(this,'transferred')">הועברו 🚀</button>
    <button class="filter-btn" data-status="cancelled" onclick="setStatusFilter(this,'cancelled')">בוטלו ❌</button>
  </div>

  <!-- ORDERS -->
  <div class="orders-wrap">
    <div class="loading-wrap" id="loading">⏳ טוען הזמנות...</div>
    <div id="orders-container" style="display:none"></div>
  </div>
</div>

<!-- ── DELAY MODAL ── -->
<div id="delay-modal">
  <div class="delay-box">
    <div class="delay-title">⏳ שליחת עיכוב</div>
    <div class="delay-sub" id="delay-customer-name">ללקוח</div>
    <div class="delay-mins-row">
      <button class="delay-min-btn" onclick="selectDelayMin(this,10)">10 דק׳</button>
      <button class="delay-min-btn" onclick="selectDelayMin(this,15)">15 דק׳</button>
      <button class="delay-min-btn" onclick="selectDelayMin(this,20)">20 דק׳</button>
      <button class="delay-min-btn" onclick="selectDelayMin(this,30)">30 דק׳</button>
    </div>
    <div class="delay-custom">
      <input type="number" id="delay-custom-input" placeholder="זמן אחר..." min="1" max="120" oninput="clearDelayBtns()">
    </div>
    <button class="delay-send-btn" onclick="confirmDelay()">📲 שלח הודעה</button>
    <button class="delay-cancel-btn" onclick="closeDelayModal()">ביטול</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════
   AUTH
══════════════════════════════ */
const ADMIN_PASS = '123456';

function doLogin(){
  const val = document.getElementById('pwd-input').value;
  if(val === ADMIN_PASS){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('admin_auth','1');
    initApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pwd-input').classList.add('err');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function doLogout(){
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

if(sessionStorage.getItem('admin_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let allOrders = [];
let statusFilter = 'all';
let _delayOrderId = null;
let _selectedDelayMin = null;

/* ══════════════════════════════
   INIT
══════════════════════════════ */
function initApp(){
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('filter-date').value = today;

  const ready = ()=>{
    const q = window._query(
      window._collection(window._db,'orders'),
      window._orderBy('createdAtMs','desc')
    );
    window._onSnapshot(q, snap=>{
      allOrders = snap.docs.map(d=>({id:d.id,...d.data()}));
      applyFilters();
    });
  };

  if(window._firebaseReady) ready();
  else document.addEventListener('firebase-ready', ready);
}

if(sessionStorage.getItem('admin_auth')==='1'){
  const tryInit = ()=>{ if(window._firebaseReady) initApp(); else document.addEventListener('firebase-ready',initApp); };
  tryInit();
}

/* ══════════════════════════════
   FILTERS
══════════════════════════════ */
function setStatusFilter(btn, status){
  statusFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  const dateVal = document.getElementById('filter-date').value;
  let filtered = [...allOrders];

  if(dateVal){
    filtered = filtered.filter(o=> o.date === dateVal || (o.createdAt && o.createdAt.startsWith(dateVal)));
  }

  if(statusFilter !== 'all'){
    filtered = filtered.filter(o=> o.status === statusFilter);
  }

  renderStats(filtered, dateVal);
  renderOrders(filtered);
}

/* ══════════════════════════════
   STATS
══════════════════════════════ */
function renderStats(filtered, dateVal){
  const todayAll = allOrders.filter(o=> o.date===dateVal || (o.createdAt&&o.createdAt.startsWith(dateVal)));

  document.getElementById('stat-new').textContent         = todayAll.filter(o=>o.status==='new').length;
  document.getElementById('stat-confirmed').textContent   = todayAll.filter(o=>o.status==='confirmed').length;
  document.getElementById('stat-ready').textContent       = todayAll.filter(o=>o.status==='ready').length;
  document.getElementById('stat-transferred').textContent = todayAll.filter(o=>o.status==='transferred').length;
  const rev = todayAll.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  document.getElementById('stat-revenue').textContent     = rev ? '₪'+rev : '₪0';
}

/* ══════════════════════════════
   RENDER ORDERS
══════════════════════════════ */
function renderOrders(orders){
  document.getElementById('loading').style.display = 'none';
  const container = document.getElementById('orders-container');
  container.style.display = 'block';

  if(!orders.length){
    container.innerHTML = `<div class="empty-orders">
      <div class="empty-icon">🍕</div>
      <div style="font-size:18px;font-weight:700;color:var(--char);margin-bottom:8px;">אין הזמנות</div>
      <div style="font-size:14px;">לא נמצאו הזמנות לפי הפילטר הנבחר</div>
    </div>`;
    return;
  }

  const groups = {};
  orders.forEach(o=>{
    const key = o.date || 'ללא תאריך';
    if(!groups[key]) groups[key]=[];
    groups[key].push(o);
  });

  const sortedDates = Object.keys(groups).sort((a,b)=>a>b?1:-1);

  container.innerHTML = sortedDates.map(date=>{
    const dateLabel = formatDateHebrew(date);
    const dayOrders = groups[date].sort((a,b)=>(a.slot||'')>(b.slot||'')?1:-1);
    return `
      <div class="orders-date-group">
        <div class="date-header">📅 ${dateLabel}</div>
        ${dayOrders.map(renderOrderCard).join('')}
      </div>`;
  }).join('');
}

function renderOrderCard(o){
  const statusLabel = {
    new:'חדשה 🆕',
    confirmed:'אושרה ✅',
    ready:'מוכנה 🍕',
    transferred:'הועברה 🚀',
    cancelled:'בוטלה ❌'
  }[o.status] || o.status;

  const statusClass = o.status || 'new';
  const createdTime = o.createdAt ? new Date(o.createdAt).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}) : '';
  const isDelivery  = o.type === 'delivery';

  const itemsHTML = (o.items||[]).map(it=>{
    if(it.type==='topping') return `<div class="order-item-row"><span class="order-item-name">+ ${it.name} ×${it.qty}</span><span class="order-item-price">₪${(it.price||5)*it.qty}</span></div>`;
    const tops = it.toppings&&it.toppings.length ? `<br><small style="color:var(--muted);">  + ${it.toppings.map(t=>(t.icon||'')+(t.name||'')).join(', ')}</small>` : '';
    return `<div class="order-item-row"><span class="order-item-name">🍕 ${it.name} ×${it.qty}${tops}</span><span class="order-item-price"></span></div>`;
  }).join('');

  const waMsg = encodeURIComponent(`היי ${o.name}! ההזמנה שלך אושרה לשעה ${o.slot} 🍕✅`);

  // ── כפתורי פעולה לפי סטטוס ──
  let actionBtns = '';

  if(o.status === 'new'){
    actionBtns += `<button class="action-btn btn-confirm" onclick="setStatus('${o.id}','confirmed')">✅ אשר</button>`;
  }

  if(o.status === 'confirmed'){
    actionBtns += `<button class="action-btn btn-ready" onclick="markReady('${o.id}')">🍕 מוכן — שלח ווצאפ</button>`;
  }

  // עיכוב: רק להזמנות פעילות שלא הועברו/בוטלו
  if(o.status !== 'transferred' && o.status !== 'cancelled'){
    actionBtns += `<button class="action-btn" style="background:rgba(234,179,8,.15);color:#92400e;" onclick="openDelayModal('${o.id}')">⏳ יש עיכוב</button>`;
  }

  // וואטסאפ ישיר תמיד
  actionBtns += `
    <a href="https://wa.me/972${(o.phone||'').replace(/\D/g,'').replace(/^0/,'')}?text=${waMsg}" target="_blank">
      <button class="action-btn btn-wa" style="width:100%">💬 וואטסאפ</button>
    </a>`;

  if(o.status !== 'cancelled'){
    actionBtns += `<button class="action-btn btn-cancel" onclick="setStatus('${o.id}','cancelled')">❌ בטל</button>`;
  }

  return `<div class="order-card status-${statusClass}" id="card-${o.id}">
    <div class="status-strip"></div>
    <div class="order-main">
      <div>
        <div class="order-top">
          <span class="order-num">#${o.id ? o.id.slice(-4).toUpperCase() : '????'}</span>
          ${o.slot?`<span class="order-time">🕔 ${o.slot}</span>`:''}
          ${createdTime?`<span class="order-time">נכנסה ${createdTime}</span>`:''}
          <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>

        <div class="order-customer">👤 ${o.name||'—'} &nbsp;·&nbsp; 📞 ${o.phone||'—'}</div>

        <div class="order-info-row">
          <span>${isDelivery?'🛵 משלוח':'🚶 איסוף'}</span>
          <span>📍 ${o.address||'—'}</span>
        </div>

        <div class="order-items">
          ${itemsHTML || '<div style="color:var(--muted);font-size:13px;">אין פירוט</div>'}
          ${o.deals?`<div class="order-deals">✅ מבצעים: ${o.deals}</div>`:''}
        </div>

        <div class="order-total-row">
          <span class="order-total-lbl">סה"כ לתשלום</span>
          <span class="order-total-num">₪${o.total||0}</span>
        </div>
      </div>

      <div class="order-actions">
        ${actionBtns}
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════
   MARK READY — לוגיקת "מוכן"
══════════════════════════════ */
async function markReady(id){
  const order = allOrders.find(o=>o.id===id);
  if(!order) return;

  const isDelivery = order.type === 'delivery';

  if(isDelivery){
    // משלוח: שאל כמה דקות
    const mins = prompt(`כמה דקות עד שמגיע השליח ל${order.name || 'לקוח'}?`);
    if(mins === null) return; // ביטול
    const minsNum = parseInt(mins);
    if(!minsNum || minsNum < 1){ showToast('הכנס מספר דקות תקין'); return; }

    const msg = encodeURIComponent(
      `היי *${order.name}*! 🍕🔥\n` +
      `הפיצה שלך מוכנה ויוצאת אליך למשלוח בעוד כ-*${minsNum} דקות*!\n\n` +
      `תודה שהזמנת מפיצה בנימינה 🙏`
    );
    window.open(`https://wa.me/972${(order.phone||'').replace(/\D/g,'').replace(/^0/,'')}?text=${msg}`,'_blank');
  } else {
    // איסוף עצמי
    const msg = encodeURIComponent(
      `היי *${order.name}*! 🍕✅\n` +
      `הפיצה שלך *מוכנה* ומחכה לך!\n` +
      `אפשר להגיע לאסוף מ-${order.address || 'הסניף'} 🚶\n\n` +
      `תודה שהזמנת מפיצה בנימינה 🔥`
    );
    window.open(`https://wa.me/972${(order.phone||'').replace(/\D/g,'').replace(/^0/,'')}?text=${msg}`,'_blank');
  }

  // עדכן סטטוס ל-"הועבר"
  await setStatus(id, 'transferred');
}

/* ══════════════════════════════
   DELAY MODAL
══════════════════════════════ */
function openDelayModal(id){
  _delayOrderId = id;
  _selectedDelayMin = null;
  const order = allOrders.find(o=>o.id===id);
  document.getElementById('delay-customer-name').textContent = order ? `ל${order.name}` : '';
  document.getElementById('delay-custom-input').value = '';
  document.querySelectorAll('.delay-min-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('delay-modal').classList.add('open');
}

function closeDelayModal(){
  document.getElementById('delay-modal').classList.remove('open');
  _delayOrderId = null;
  _selectedDelayMin = null;
}

function selectDelayMin(btn, mins){
  _selectedDelayMin = mins;
  document.getElementById('delay-custom-input').value = '';
  document.querySelectorAll('.delay-min-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function clearDelayBtns(){
  _selectedDelayMin = null;
  document.querySelectorAll('.delay-min-btn').forEach(b=>b.classList.remove('sel'));
}

function confirmDelay(){
  const customVal = parseInt(document.getElementById('delay-custom-input').value);
  const mins = _selectedDelayMin || customVal;
  if(!mins || mins < 1){ showToast('בחר כמות דקות'); return; }

  const order = allOrders.find(o=>o.id===_delayOrderId);
  if(!order){ closeDelayModal(); return; }

  const msg = encodeURIComponent(
    `היי *${order.name}* 😊\n` +
    `רצינו לעדכן שיש עיכוב קטן של כ-*${mins} דקות*.\n` +
    `הפיצה שלך תהיה מוכנה בקרוב! 🍕🔥\n` +
    `מתנצלים על אי הנוחות 🙏`
  );
  window.open(`https://wa.me/972${(order.phone||'').replace(/\D/g,'').replace(/^0/,'')}?text=${msg}`,'_blank');
  showToast(`⏳ הודעת עיכוב נשלחה ל${order.name}`);
  closeDelayModal();
}

// סגירת מודל בלחיצה מחוץ לתוכן
document.getElementById('delay-modal').addEventListener('click', function(e){
  if(e.target === this) closeDelayModal();
});

/* ══════════════════════════════
   SET STATUS
══════════════════════════════ */
async function setStatus(id, status){
  if(!window._firebaseReady) return;
  try{
    await window._updateDoc(window._doc(window._db,'orders',id),{status});
    const labels = {confirmed:'✅ אושרה',ready:'🍕 מוכנה',transferred:'🚀 הועברה',cancelled:'❌ בוטלה'};
    showToast(labels[status]||'עודכן');
  }catch(e){ showToast('שגיאה בעדכון'); console.error(e); }
}

/* ══════════════════════════════
   HELPERS
══════════════════════════════ */
function formatDateHebrew(dateStr){
  if(!dateStr||dateStr==='ללא תאריך') return dateStr;
  try{
    const d = new Date(dateStr+'T12:00:00');
    return d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  }catch{ return dateStr; }
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
